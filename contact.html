content="Contact Subhiksha S for projects and collaborations.">

<header>

<main>

<section>

<h1>Contact Me</h1>

<form aria-label="Contact Form">

<div>

<label for="name">
Full Name
</label>

<input
type="text"
id="name"
name="name"
required
aria-required="true">

</div>

<div>

<label for="email">
Email Address
</label>

<input
type="email"
id="email"
name="email"
required
aria-required="true">

</div>

<div>

<label for="message">
Message
</label>

<textarea
id="message"
name="message"
rows="5"
required
aria-required="true"></textarea>

</div>

<button type="submit">
Send Message
</button>

</form>

</section>

</main>
